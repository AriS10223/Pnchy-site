<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pnchy — Thank You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:    rgb(233, 229, 205);
      --soft:  rgb(250, 247, 242);
      --dark:  rgb(61, 53, 48);
      --serif: 'Instrument Serif', Georgia, serif;
      --sans:  'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--dark);
      font-family: var(--serif);
      width: 1200px;
      height: 1080px;
      max-width: 100vw;
      overflow: clip;
      position: relative;
      margin: 0 auto;
    }

    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: rgba(233, 229, 205, 0.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .nav-logo { display: flex; align-items: center; gap: 8px; }
    .nav-logo img { width: 36px; height: 36px; object-fit: contain; }
    .nav-logo span { font-family: var(--serif); font-style: italic; font-size: 22px; letter-spacing: -0.03em; }

    .nav-links { display: flex; gap: 8px; }
    .nav-links a {
      font-family: var(--sans); font-size: 13px; font-weight: 500;
      padding: 7px 14px; border-radius: 100px; transition: opacity .15s;
      background: var(--soft); color: var(--dark);
    }
    .nav-links a:hover { opacity: .8; }

    /* "We appreciate your feedback." — top: 269px */
    .line-1 {
      position: absolute;
      width: 600px; max-width: 90vw;
      top: 269px;
      left: 50%; transform: translateX(-50%);
      font-family: var(--serif); font-weight: 400;
      font-size: clamp(16px, 2vw, 22px);
      letter-spacing: -0.02em; line-height: 1.6;
      color: var(--dark);
    }

    /* "One of our super awesome..." — top: 326px */
    .line-2 {
      position: absolute;
      width: 600px; max-width: 90vw;
      top: 326px;
      left: 50%; transform: translateX(-50%);
      font-family: var(--serif); font-weight: 400;
      font-size: clamp(16px, 2vw, 22px);
      letter-spacing: -0.02em; line-height: 1.6;
      color: var(--dark);
    }

    /* Image — top: 452px, clickable back to home */
    .thankyou-img {
      position: absolute;
      width: 502px; max-width: 85vw;
      height: 246px;
      top: 452px;
      left: 51%; transform: translateX(-51%);
      object-fit: contain;
      cursor: pointer;
    }

    /* "We are glad you want to..." — top: 420px */
    .line-3 {
      position: absolute;
      width: 600px; max-width: 90vw;
      top: 420px;
      left: 50%; transform: translateX(-50%);
      font-family: var(--serif); font-weight: 400;
      font-size: clamp(16px, 2vw, 22px);
      letter-spacing: -0.02em; line-height: 1.6;
      color: var(--dark);
    }

    @media (max-width: 680px) {
      body { width: 100vw; height: auto; min-height: 100vh; overflow: visible; padding-top: 80px; padding-bottom: 60px; }
      .line-1, .line-2, .line-3, .thankyou-img {
        position: static;
        display: block;
        transform: none;
        margin: 0 auto 24px;
        width: 88%;
        left: auto; top: auto;
      }
      .thankyou-img { height: auto; }
      .nav-logo span { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-logo">
      <img src="images/New_PNchy_Logo.png" alt="Pnchy" />
      <span>pnchy</span>
    </a>
    <div class="nav-links">
      <a href="https://pnchy.framer.website/blog">What are y'all up to?</a>
    </div>
  </nav>

  <div class="line-1">We appreciate your feedback.</div>
  <div class="line-2">One of our super awesome team members will be in touch with you.</div>
  <div class="line-3">We are glad you want to embark on this journey with us.</div>

  <a href="/"><img class="thankyou-img"
    src="https://framerusercontent.com/images/cp0rmNNvGMLXrSbW4dJHaPkWo.png"
    alt="Pnchy" /></a>

</body>
</html>
